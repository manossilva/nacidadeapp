<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F4C35" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Aju Guide" />

    <!-- SEO -->
    <title>Aju Guide — O que fazer em Aracaju hoje</title>
    <meta name="description" content="Descubra os melhores bares, restaurantes, eventos e passeios em Aracaju com curadoria local." />
    <link rel="canonical" href="https://ajuguide.com.br" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ajuguide.com.br" />
    <meta property="og:title" content="Aju Guide — O que fazer em Aracaju hoje" />
    <meta property="og:description" content="Descubra os melhores bares, restaurantes, eventos e passeios em Aracaju com curadoria local." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aju Guide — O que fazer em Aracaju hoje" />
    <meta name="twitter:description" content="Descubra os melhores bares, restaurantes, eventos e passeios em Aracaju." />
    <meta name="twitter:image" content="https://ajuguide.com.br/og-image.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  </head>
  <body>
    <script>
      (function(){
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
